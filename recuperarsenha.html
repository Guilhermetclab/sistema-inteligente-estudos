<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-card">
        <h2>Recuperar Senha</h2>  
        <!-- Joguei  o CSS direto dentro da tag --- passar pro CSS depois!-->
        <p style="text-align: center; color: #666; font-size: 0.9em; margin-bottom: 20px;">
            Digite o seu e-mail cadastrado. Enviaremos um link para você criar uma nova senha.
        </p>
        <!--action="/recuperar-pos"-->
        <form method="POST">
            <div class="input-group">
                <label for="iemail">E-mail</label>
                <input type="email" id="iemail" name="email" placeholder="exemplo@email.com" required>
            </div>
            
            <button type="submit">Enviar Link</button>
        </form>
        
        <div class="registro-link">
            Lembrou a senha? <a href="login.html">Voltar para o Login</a>
        </div>
    </div>

</body>
</html>
