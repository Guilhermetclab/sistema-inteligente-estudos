<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- viewport: Essencial para sites responsivos. Informa ao que a página deve se ajustar à tela do aparelho. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowzen</title>
    <link rel="stylesheet" href="css/paginainicial.css">
</head>
<body>

<header>
    <div class="logo">
    <img src="img/logo-removed.jpeg" alt="Flowzen">
    FLOWZEN
    </div>
    <!-- <nav>
        <a href="#">Início</a>
        <a href="#">Recursos</a>
        <a href="#">Sobre</a>
    </nav> -->

    <a href="login.html" class="btn-login">
        Entrar
    </a>
</header>

<!-- section class="hero": Tag semântica usada para indicar a seção principal e de 
     maior destaque do site. Ajuda na organização e na leitura de motores de busca. -->
<section class="hero">

    <!-- div class="hero-content": Container utilitário. Serve para agrupar e limitar 
         a largura máxima do texto, impedindo que as frases estiquem demais em telas gigantes. -->
    <div class="hero-content">

        <!-- span class="tag": Uso correto do span para um elemento de texto curto em linha, 
             que serve apenas para estilização visual e não como um parágrafo de leitura. -->
        <span class="tag">
            Foco • Organização • Evolução
        </span>

        <h1>
            Organize seus estudos.<br>
            Planeje sua rotina.<br>
            Evolua todos os dias.
        </h1>

        <p>
            O Flowzen reúne estudos, planejamento,
            metas e produtividade em uma única plataforma.
        </p>

        <!-- <a href="login.html" class="btn-principal">
            Começar Agora
        </a> -->
    </div>
</section>
</body>
</html>
