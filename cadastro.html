<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Aluno</title>
    <link rel="stylesheet" href="css/cadastro.css">
    
</head>

<body>
    <div class="cad form-container">
        <form class="input-group" action="cadastro.php" method="post" autocomplete="on">
            <div class="logo">
                <img src="img/logotipo.jpeg" alt="logo">
            </div>
            <h2>Cadastre-se aqui</h2><br>

            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" name="nome" minlength="5" maxlength="20" required
                placeholder="Digite seu nome completo"> <br> 

            <label for="email">E-mail:</label> 
            <input type="email" id="email" name="email" autocomplete="email" required
                placeholder="seuemail@exemplo.com"> <br>

            <label for="itel">Telefone (formato(xx)xxxxx-xxxx):</label>
            <input type="tel" name="tel" id="itel" autocomplete="tel" pattern="^\(\d{2}\)\d{4,5}-\d{4}$" required
            placeholder="(11)91234-5678"> <br>

            <label for="senha">Crie uma senha:</label>
            <input type="text" id="senha" name="senha" required> <br>
            <label for="confirma-senha">Confirme sua senha:</label>
            <input type="password" id="confirma-senha" name="confirma-senha" autocomplete="new-password" required><br>

            <label for="rg">RG:</label>
            <input type="text" id="rg" name="rg" placeholder="00.000.000-0" maxlength="12"/> 
            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" inputmode="numeric"/> 
            <label for="nascimento">Data de nascimento:</label>
            <input type="date" id="nascimento" name="nascimento"/> <br>
            <label for="endereço">Endereço:</label>
            <input type="endereco" id="endereço" name="endereco"  size="83"required>
            <label for="cep">CEP:</label>
            <input type="number" id="cep" name="cep" required placeholder="00.000-000">
            <label for="estado">Estado:</label>
            <select name="estado" id="estado">
                <option value="" selected>--Selecione seu estado--</option>
                <option value="AC">Acre</option>
                <option value="AL">Alagoas</option>
                <option value="AP">Amapá</option>
                <option value="AM">Amazonas</option>
                <option value="BA">Bahia</option>
                <option value="CE">Ceará</option>
                <option value="DF">Distrito Federal</option>
                <option value="ES">Espírito Santo</option>
                <option value="GO">Goiás</option>
                <option value="MA">Maranhão</option>
                <option value="MT">Mato Grosso</option>
                <option value="MS">Mato Grosso do Sul</option>
                <option value="MG">Minas Gerais</option>
                <option value="PA">Pará</option>
                <option value="PB">Paraíba</option>
                <option value="PR">Paraná</option>
                <option value="PE">Pernambuco</option>
                <option value="PI">Piauí</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="RN">Rio Grande do Norte</option>
                <option value="RS">Rio Grande do Sul</option>
                <option value="RO">Rondônia</option>
                <option value="RR">Roraima</option>
                <option value="SC">Santa Catarina</option>
                <option value="SP">São Paulo</option>
                <option value="SE">Sergipe</option>
                <option value="TO">Tocantins</option>
            </select><br>

            <button class="btn btn-primary" type="button">Cadastrar</button><br>
            <p>Ao concluir o registro você concorda com nossos Termos de uso e nossa Política de Privacidade</p> <br>
        </form>
    </div>
    <div class="registro-link">
        Já possui uma conta? <a href="/login.php">Entre agora</a>
        <footer class="rodape-site"> &copy; 2026 Seu Site. Todos os direitos reservados.</footer>
    </div>
</body>

</html>
