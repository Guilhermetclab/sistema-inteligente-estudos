<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Flowzen</title>
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>

    <div class="container">
            <div class="card">
            <header class="logo-area">
            <img src="img/logo-removed.jpeg" alt="Flowzen">
            <h2>Cadastre-se</h2>
            <p>Preencha os dados abaixo para criar sua conta.</p>
            </header>
            <form class="input-group" action="cadastro.php" method="post" autocomplete="on">

                <div class="campo">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">
                </div>

                <div class="grid">
                    <div class="campo">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" autocomplete="email" required placeholder="email@exemplo.com">
                </div>

                    <div class="campo">
                        <label for="nascimento">Data de Nascimento</label>
                        <input type="date" id="nascimento" name="nascimento" required>
                    </div>
                </div>
                <div class="grid">
                    <div class="campo">
                        <label for="rg">RG</label>
                        <input type="text" id="rg" name="rg" placeholder="00.000.000-0" maxlength="12" required>
                    </div>

                    <div class="campo">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" inputmode="numeric" required>
                    </div>
                </div>

                <div class="grid">
                    <div class="campo">
                        <label for="tel">Telefone</label>
                        <input type="tel" name="tel" id="tel" autocomplete="tel" pattern="^\(\d{2}\)\d{4,5}-\d{4}$" required placeholder="(11) 99999-9999">
                    </div>

                    <div class="campo">
                        <label for="cep">CEP</label>
                        <input type="text" id="cep" name="cep" placeholder="00.000-000" required>
                    </div>
                </div>

                    <div class="campo">
                        <label for="endereco">Endereço</label>
                        <input type="text" id="endereco" name="endereco" required>
                    </div>

                <div class="grid">
                    <div class="campo">
                       <label for="estado">Estado:</label>
                          <select name="estado" id="estado">
                          <option value="" selected>--Selecione seu estado--</option>
                          <option value="AC">Acre</option>
                          <option value="AL">Alagoas</option>
                          <option value="AP">Amapá</option>
                          <option value="AM">Amazonas</option>
                          <option value="BA">Bahia</option>
                          <option value="CE">Ceará</option>
                          <option value="DF">Distrito Federal</option>
                          <option value="ES">Espírito Santo</option>
                          <option value="GO">Goiás</option>
                          <option value="MA">Maranhão</option>
                          <option value="MT">Mato Grosso</option>
                          <option value="MS">Mato Grosso do Sul</option>
                          <option value="MG">Minas Gerais</option>
                          <option value="PA">Pará</option>
                          <option value="PB">Paraíba</option>
                          <option value="PR">Paraná</option>
                          <option value="PE">Pernambuco</option>
                          <option value="PI">Piauí</option>
                          <option value="RJ">Rio de Janeiro</option>
                          <option value="RN">Rio Grande do Norte</option>
                          <option value="RS">Rio Grande do Sul</option>
                          <option value="RO">Rondônia</option>
                          <option value="RR">Roraima</option>
                          <option value="SC">Santa Catarina</option>
                          <option value="SP">São Paulo</option>
                          <option value="SE">Sergipe</option>
                          <option value="TO">Tocantins</option>
                          </select>
                    </div>

                    <div class="campo">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" name="cidade" required>
                    </div>
                </div>

                <div class="grid">
                    <div class="campo">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" required>
                    </div>

                    <div class="campo">
                        <label for="confirma-senha">Confirmar Senha</label>
                        <input type="password" id="confirma-senha" name="confirma-senha" autocomplete="new-password" required>
                    </div>
                </div>
                <button type="submit">Cadastrar</button>

                <p class="termos">
                    Ao concluir o registro você concorda com nossos Termos de Uso e Política de Privacidade.
                </p>
            </form>
        </div>
        <div class="registro-link">
        Já possui uma conta? <a href="/login.php">Entre agora</a>
        </div>
        <footer class="rodape-site"> &copy; 2026 Flowzen.com.br. Todos os direitos reservados.</footer>

</div>
</body>
</html>
