<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Aluno</title>
    <link rel="stylesheet" href="css/cadastro.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

<body>

    <div class="central">
        <form class="formulario" action="cadastro.php" method="post" autocomplete="on">

            <legend>Cadastre-se aqui</legend> <br><br>
            <label for="isen">Nome: </label>
            <input type="text" placeholder="Seu nome" min="5" max="30" required><br><br>
            <label for="isen">Email: </label>
            <input type="email" placeholder="Seu e-mail" size="30" required><br><br>

            <label for="senha">Crie uma senha:</label>
            <input type="password" id="senha" name="senha" autocomplete="new-password" required> <br><br>

            <label for="confirma-senha">Confirme a senha:</label>
            <input type="password" id="confirma-senha" name="confirma-senha" autocomplete="new-password" required>
            <br><br>
            <button class="btn btn-primary" type="button">Cadastrar</button><br>
            <p>Ao concluir o registro você concorda com nossos Termos de uso e nossa Política de Privacidade</p>
    <br><br>  </form>

    
    </div><br><br>
